<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>11조 연단 멘트 리허설</title>
<style>
  :root { --navy:#02325C; --gold:#FFC000; --rail:#F6F7FB; }
  body { margin:0; font-family:"맑은 고딕",Malgun Gothic,sans-serif; background:var(--rail); color:#1A2332; }
  .wrap { max-width:720px; margin:0 auto; padding:24px 16px 48px; }
  h1 { font-size:20px; color:var(--navy); margin:0 0 8px; }
  .sub { color:#5B6B7F; font-size:13px; margin-bottom:20px; }
  .card { background:#fff; border:1px solid #E2E8F1; border-radius:12px; padding:18px 20px; margin-bottom:14px; }
  .script { font-size:18px; line-height:1.7; font-weight:700; color:var(--navy); }
  .timer { font-size:48px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--navy); text-align:center; }
  .timer.warn { color:#E60028; }
  .timer.ok { color:#0a7a3e; }
  .btns { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:12px; }
  button { border:none; border-radius:8px; padding:10px 18px; font-weight:800; cursor:pointer; font-family:inherit; }
  .go { background:var(--navy); color:#fff; }
  .stop { background:#E60028; color:#fff; }
  .reset { background:#fff; border:1px solid #bbb; color:#333; }
  .log li { margin:6px 0; }
  .pass { color:#0a7a3e; font-weight:800; }
  .fail { color:#E60028; font-weight:800; }
  .hint { font-size:12px; color:#5B6B7F; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>연단 인트로 리허설</h1>
  <p class="sub">목표 20~28초 · 2회 통과 필요 · 영상 중 설명은 NARRATION.md 참고</p>

  <div class="card">
    <div class="script" id="script">
      안녕하세요, 11조 함께하조 조장 김재원입니다.<br>
      저희는 노동감독관이 쓰는 시스템 느낌으로 조를 소개하는 웹페이지를 만들었습니다.<br>
      지금 휴대폰으로 QR을 스캔해 접속해 보시면, 화면을 직접 따라오실 수 있습니다.<br>
      접속하신 뒤, 시연 영상을 함께 보겠습니다.
    </div>
  </div>

  <div class="card">
    <div class="timer" id="timer">0.0</div>
    <div class="btns">
      <button type="button" class="go" id="startBtn">시작</button>
      <button type="button" class="stop" id="stopBtn">정지·기록</button>
      <button type="button" class="reset" id="resetBtn">리셋</button>
    </div>
    <p class="hint">20~28초면 합격. 너무 짧거나 길면 다시.</p>
  </div>

  <div class="card">
    <strong>기록</strong>
    <ol class="log" id="log"></ol>
    <p id="status">통과 0 / 2</p>
  </div>
</div>
<script>
const timerEl = document.getElementById('timer');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
let t0 = 0, raf = 0, running = false;
const KEY = 'noriter-rehearse-v1';
let passes = JSON.parse(localStorage.getItem(KEY) || '[]');

function render() {
  logEl.innerHTML = '';
  let ok = 0;
  passes.forEach((p, i) => {
    const li = document.createElement('li');
    const good = p.sec >= 20 && p.sec <= 28;
    if (good) ok++;
    li.innerHTML = `${i + 1}회: ${p.sec.toFixed(1)}초 — <span class="${good ? 'pass' : 'fail'}">${good ? '합격' : '재시도'}</span>`;
    logEl.appendChild(li);
  });
  statusEl.textContent = `통과 ${ok} / 2` + (ok >= 2 ? ' ✅ 리허설 완료' : '');
  statusEl.className = ok >= 2 ? 'pass' : '';
}

function tick() {
  const sec = (performance.now() - t0) / 1000;
  timerEl.textContent = sec.toFixed(1);
  timerEl.className = 'timer' + (sec > 22 ? ' warn' : sec >= 15 ? ' ok' : '');
  raf = requestAnimationFrame(tick);
}

document.getElementById('startBtn').onclick = () => {
  if (running) return;
  running = true;
  t0 = performance.now();
  raf = requestAnimationFrame(tick);
};

document.getElementById('stopBtn').onclick = () => {
  if (!running) return;
  running = false;
  cancelAnimationFrame(raf);
  const sec = (performance.now() - t0) / 1000;
  timerEl.textContent = sec.toFixed(1);
  passes.push({ sec, at: new Date().toISOString() });
  localStorage.setItem(KEY, JSON.stringify(passes));
  render();
};

document.getElementById('resetBtn').onclick = () => {
  running = false;
  cancelAnimationFrame(raf);
  timerEl.textContent = '0.0';
  timerEl.className = 'timer';
  passes = [];
  localStorage.removeItem(KEY);
  render();
};

render();
</script>
</body>
</html>
