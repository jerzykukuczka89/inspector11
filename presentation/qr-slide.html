<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>11조 함께하조 — QR 접속</title>
<style>
  :root {
    --navy: #02325C;
    --navy2: #0A4A82;
    --gold: #FFC000;
    --gov-red: #E60028;
    --soft: #DCE8F6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0e1420; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: "맑은 고딕", "Malgun Gothic", sans-serif;
    color: #fff;
  }
  .slide {
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    background: linear-gradient(145deg, var(--navy) 0%, #03406e 55%, var(--navy2) 100%);
    position: relative;
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 3%;
    padding: 4.5% 5%;
    box-shadow: 0 24px 80px rgba(0,0,0,.45);
  }
  .slide::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: var(--gov-red);
  }
  .left { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
  .eyebrow {
    display: flex; align-items: center; gap: 12px;
    color: var(--soft); font-size: clamp(13px, 1.5vw, 18px); font-weight: 700;
    margin-bottom: 3.5%;
  }
  .eyebrow img { height: clamp(28px, 3.2vw, 40px); width: auto; }
  .brand-bar {
    width: 10px; height: clamp(48px, 6vw, 72px);
    background: var(--gold); border-radius: 2px;
    margin-bottom: 2.5%;
  }
  h1 {
    font-size: clamp(32px, 4.6vw, 56px); font-weight: 800;
    letter-spacing: -1px; line-height: 1.15; margin-bottom: 2%;
  }
  .sub {
    font-size: clamp(18px, 2.2vw, 28px); font-weight: 700;
    color: var(--gold); margin-bottom: 4%;
  }
  .guide {
    font-size: clamp(15px, 1.8vw, 22px); line-height: 1.55;
    color: var(--soft); font-weight: 600; max-width: 28ch;
  }
  .hint {
    margin-top: 5%;
    font-size: clamp(14px, 1.5vw, 18px); font-weight: 700;
  }
  .url {
    margin-top: auto; padding-top: 8%;
    font-size: clamp(12px, 1.3vw, 15px); color: #9fb8d4; word-break: break-all;
  }
  .meta { margin-top: 1%; font-size: clamp(11px, 1.2vw, 13px); color: #7f9ec2; }
  .card {
    align-self: center; justify-self: center;
    background: #fff; color: var(--navy);
    border-radius: 16px;
    width: min(100%, 360px);
    padding: 6% 6% 5%;
    text-align: center;
    box-shadow: 0 18px 48px rgba(0,0,0,.28);
  }
  .card img {
    width: 100%; max-width: 280px; height: auto;
    display: block; margin: 0 auto 4%;
  }
  .card b { display: block; font-size: clamp(16px, 1.8vw, 20px); margin-bottom: 2%; }
  .card span { font-size: clamp(12px, 1.3vw, 14px); color: var(--navy2); font-weight: 700; }
</style>
</head>
<body>
  <div class="slide">
    <div class="left">
      <div class="eyebrow">
        <img src="../assets_emblem_only.svg" alt="" onerror="this.style.display='none'">
        <span>노사누리 · 근로감독행정시스템</span>
      </div>
      <div class="brand-bar" aria-hidden="true"></div>
      <h1>11조  함께하조</h1>
      <p class="sub">노동감독관, 일의 의미</p>
      <p class="guide">휴대폰 카메라로 QR을 스캔하면<br>지금 바로 조 소개 웹페이지에 접속할 수 있습니다.</p>
      <p class="hint">접속 후 시연 영상을 함께 봐 주세요</p>
      <p class="url">https://inspector11.vercel.app/</p>
      <p class="meta">신규 노동감독관 수사학교 · 조별 발표</p>
    </div>
    <div class="card">
      <img src="qr_inspector11.png" alt="QR 코드 — inspector11.vercel.app">
      <b>QR 스캔</b>
      <span>inspector11.vercel.app</span>
    </div>
  </div>
</body>
</html>
